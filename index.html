<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="OSClick - Download Operating Systems ISO files for free. Windows, Linux, macOS.">
    <title>OSClick - Free Operating System ISO Downloads</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="logo">
                <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/>
                    <circle cx="12" cy="12" r="3"/>
                    <path d="M12 2v3M12 19v3M2 12h3M19 12h3"/>
                </svg>
                <span class="logo-text">OSClick</span>
            </div>
            <p class="tagline">Download ISO files of operating systems in a few clicks</p>
        </div>
    </header>

    <main class="main">
        <div class="container">

            <!-- Global Search -->
            <div class="search-container">
                <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"/>
                    <path d="M21 21l-4.35-4.35"/>
                </svg>
                <input type="text" id="searchInput" class="search-input" placeholder="Search OS by name, version, edition... (e.g. ubuntu, windows 11)">
                <button class="search-clear" id="searchClear" style="display: none;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                        <line x1="15" y1="9" x2="9" y2="15"/>
                        <line x1="9" y1="9" x2="15" y2="15"/>
                    </svg>
                </button>
            </div>

            <!-- Hierarchical Selectors -->
            <div class="selectors-container">
                <div class="selector-group">
                    <label for="familySelect" class="selector-label">OS Family</label>
                    <select id="familySelect" class="selector">
                        <option value="">Select OS...</option>
                    </select>
                </div>

                <div class="selector-group">
                    <label for="mainSelect" class="selector-label">OS Name</label>
                    <select id="mainSelect" class="selector" disabled>
                        <option value="">Choose OS...</option>
                    </select>
                </div>
                <div class="selector-group">
                    <label for="versionSelect" class="selector-label">Version</label>
                    <select id="versionSelect" class="selector" disabled>
                        <option value="">Choose version...</option>
                    </select>
                </div>
                <div class="selector-group">
                    <label for="editionSelect" class="selector-label">Edition</label>
                    <select id="editionSelect" class="selector" disabled>
                        <option value="">Choose edition...</option>
                    </select>
                </div>
                <div class="selector-group">
                    <label for="languageSelect" class="selector-label">Language</label>
                    <select id="languageSelect" class="selector" disabled>
                        <option value="">Choose language...</option>
                    </select>
                </div>
                <div class="selector-group selector-group-reset">
                    <label class="selector-label">&nbsp;</label>
                    <button id="resetBtn" class="reset-btn" title="Reset all filters">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
                            <path d="M3 3v5h5"/>
                        </svg>
                        Reset
                    </button>
                </div>
            </div>

            <!-- Stats -->
            <div class="stats">
                <span id="resultCount">0</span> matching ISOs found
            </div>

            <!-- OS Grid -->
            <div class="os-grid" id="osGrid">
                <!-- OS cards inserted by JavaScript -->
            </div>

            <!-- No Results -->
<div class="no-results" id="noResults" style="display: none;">
                <svg class="no-results-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"/>
                    <path d="M21 21l-4.35-4.35"/>
                </svg>
                <h3>No operating systems found</h3>
                <p>Select OS family to begin</p>
            </div>

        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>
                &copy; 2026 OSClick &mdash; All operating systems and trademarks are property of their respective owners.
                Download links point to official sources.
            </p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
