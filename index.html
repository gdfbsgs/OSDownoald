<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="OSClick - Download Operating Systems ISO files for free. Windows, Linux, macOS.">
    <title>OSClick - Free Operating System ISO Downloads</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="logo">
                <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/>
                    <circle cx="12" cy="12" r="3"/>
                    <path d="M12 2v3M12 19v3M2 12h3M19 12h3"/>
                </svg>
                <span class="logo-text">OSClick</span>
            </div>
            <p class="tagline">Download ISO files of operating systems in a few clicks</p>
        </div>
    </header>

    <main class="main">
        <div class="container">

            <!-- Search Bar -->
            <div class="search-container">
                <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"/>
                    <path d="M21 21l-4.35-4.35"/>
                </svg>
                <input
                    type="text"
                    id="searchInput"
                    class="search-input"
                    placeholder="Search for an operating system..."
                    autocomplete="off"
                >
                <button class="search-clear" id="clearBtn" type="button" aria-label="Clear search">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M18 6L6 18M6 6l12 12"/>
                    </svg>
                </button>
            </div>

            <!-- Family Filter Buttons -->
            <div class="filter-bar">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="Windows">🪟 Windows</button>
                <button class="filter-btn" data-filter="Linux">🐧 Linux</button>
                <button class="filter-btn" data-filter="macOS">🍎 macOS</button>
            </div>

            <!-- Stats -->
            <div class="stats">
                <span id="resultCount">59</span> ISO files available
            </div>

            <!-- OS Grid -->
            <div class="os-grid" id="osGrid">
                <!-- OS cards inserted by JavaScript -->
            </div>

            <!-- No Results -->
            <div class="no-results" id="noResults" style="display: none;">
                <svg class="no-results-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"/>
                    <path d="M21 21l-4.35-4.35"/>
                </svg>
                <h3>No operating systems found</h3>
                <p>Try searching with different keywords</p>
            </div>

        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>
                &copy; 2026 OSClick &mdash; All operating systems and trademarks are property of their respective owners.
                Download links point to official sources.
            </p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
